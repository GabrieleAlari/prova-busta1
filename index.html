<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>M. Studio — Premium Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#141210} /* Sfondo scuro per far risaltare il rendering premium */
#stage{width:100%;height:100vh;position:relative;overflow:hidden}
canvas#three{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}
#hint{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;transition:opacity 0.8s cubic-bezier(0.25,1,0.5,1);display:flex;flex-direction:column;align-items:center;gap:12px;z-index:5}
#hint-text{font-size:10px;letter-spacing:7px;text-transform:uppercase;color:#c9a96e;font-family:'Montserrat',sans-serif;font-weight:300}
#hint-arrow{opacity:0.6;animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(8px);opacity:1}}
.cur{width:8px;height:8px;border-radius:50%;background:#c9a96e;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
.cur-ring{width:40px;height:40px;border-radius:50%;border:1px solid rgba(201,169,110,0.4);position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform 0.2s cubic-bezier(0.1,0.8,0.3,1)}
#overlay{position:absolute;inset:0;background:#141210;opacity:0;pointer-events:none;transition:opacity 1.2s ease}
</style>
</head>
<body>
<div id="stage">
  <canvas id="three"></canvas>
  <div id="hint">
    <div id="hint-text">Clicca per svelare</div>
    <div id="hint-arrow"><svg width="16" height="22" viewBox="0 0 16 22" fill="none"><path d="M8 0v18M1 11l7 9 7-9" stroke="#c9a96e" stroke-width="0.8"/></svg></div>
  </div>
  <div id="overlay"></div>
</div>

<div class="cur" id="cur"></div>
<div class="cur-ring" id="curRing"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* CURSORE CUSTOM */
const cur=document.getElementById('cur'),ring=document.getElementById('curRing');
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=`${mx}px`;cur.style.top=`${my}px`;
});
(function raf(){
  requestAnimationFrame(raf);
  rx+=(mx-rx)*0.08;ry+=(my-ry)*0.08;
  ring.style.left=`${rx}px`;ring.style.top=`${ry}px`;
})();

/* ENGINE SETUP */
const canvas=document.getElementById('three');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:"high-performance"});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;
renderer.setClearColor(0x141210,1);

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x141210,0.04);
const camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,0.1,50);
camera.position.set(0,0,6.5);

function onResize(){
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize',onResize);onResize();

/* STUDIO LIGHTING CONFIGURATION (Luxury Studio Setup) */
const ambLight=new THREE.AmbientLight(0xfff6ed,0.3);
scene.add(ambLight);

const keyLight=new THREE.DirectionalLight(0xfffbf5,4.0); // Luce radente per enfatizzare le texture
keyLight.position.set(6,7,5);
keyLight.castShadow=true;
keyLight.shadow.mapSize.set(2048,2048);
keyLight.shadow.bias=-0.0001;
keyLight.shadow.radius=4;
scene.add(keyLight);

const fillLight=new THREE.DirectionalLight(0xdbe7ff,1.5); // Luce fredda di riempimento dal lato opposto
fillLight.position.set(-6,-2,3);
scene.add(fillLight);

const rimLight=new THREE.DirectionalLight(0xffe2c4,2.0); // Controluce dorato sui bordi
rimLight.position.set(0,-5,-3);
scene.add(rimLight);

const jewelryGlow=new THREE.PointLight(0xffdfa9,1.5,8); // Mette in risalto l'oro del sigillo
jewelryGlow.position.set(0,0,1);
scene.add(jewelryGlow);

/* PROCEDURAL PREMIUM TEXTURES (Generazione grana fine della carta) */
function createFinePaperTex(hexBg) {
  const cv=document.createElement('canvas');cv.width=1024;cv.height=1024;
  const cx=cv.getContext('2d');
  const r=parseInt(hexBg.slice(1,3),16),g=parseInt(hexBg.slice(3,5),16),b=parseInt(hexBg.slice(5,7),16);
  cx.fillStyle=hexBg;cx.fillRect(0,0,1024,1024);
  
  // Micro rumore
  for(let i=0;i<90000;i++){
    const x=Math.random()*1024,y=Math.random()*1024;
    const noise=(Math.random()-.5)*12;
    cx.fillStyle=`rgba(${Math.max(0,Math.min(255,r+noise))},${Math.max(0,Math.min(255,g+noise))},${Math.max(0,Math.min(255,b+noise))},0.09)`;
    cx.fillRect(x,y,1.5,1.5);
  }
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(1.5,1.5);
  return t;
}

const paperTexIvory = createFinePaperTex('#fcfaf2');
const paperTexDark  = createFinePaperTex('#e5dec9');

/* ADVANCED PHYSICAL MATERIALS (PBR MeshPhysicalMaterial) */
const mPaperBody = new THREE.MeshPhysicalMaterial({
  color:0xfcfaf2,roughness:0.92,metalness:0,map:paperTexIvory,clearcoat:0.0,bumpScale:0.005,side:THREE.DoubleSide
});
const mPaperInternal = new THREE.MeshPhysicalMaterial({
  color:0xf3edd8,roughness:0.95,metalness:0,map:paperTexDark,side:THREE.DoubleSide
});
const mGoldPremium = new THREE.MeshPhysicalMaterial({
  color:0xd4af37,roughness:0.25,metalness:0.94,clearcoat:0.3,clearcoatRoughness:0.1,envMapIntensity:2.0
});
const mWaxSeal = new THREE.MeshPhysicalMaterial({
  color:0x7a1c1c,roughness:0.4,metalness:0.0,clearcoat:0.6,clearcoatRoughness:0.3,side:THREE.DoubleSide
});
const mLetterPaper = new THREE.MeshPhysicalMaterial({
  color:0xffffff,roughness:0.88,metalness:0,clearcoat:0.0
});

/* ENVELOPE STRUCTURAL SETUP */
const EW=3.0, EH=1.9, ED=0.07;
const ehw=EW/2, ehh=EH/2;
const envGroup=new THREE.Group();
scene.add(envGroup);

// Corpo Principale Busta
const bodyGeo=new THREE.BoxGeometry(EW,EH,ED,4,4,1);
const bodyMats=[mPaperInternal,mPaperInternal,mPaperInternal,mPaperInternal,mPaperBody,mPaperInternal];
const body=new THREE.Mesh(bodyGeo,bodyMats);
body.castShadow=true;body.receiveShadow=true;
envGroup.add(body);

// Lembi Laterali Geometrici (Con spessore reale)
function createSideFlap(isLeft) {
  const s=isLeft?-1:1;
  const shape=new THREE.Shape();
  shape.moveTo(s*ehw,-ehh);shape.lineTo(s*ehw,ehh);shape.lineTo(0,ehh*0.02);shape.closePath();
  const geo=new THREE.ExtrudeGeometry(shape,{depth:0.02,bevelEnabled:true,bevelSize:0.005,bevelThickness:0.005,bevelSegments:2});
  const mesh=new THREE.Mesh(geo,mPaperInternal);
  mesh.position.z=ED/2 - 0.01;
  mesh.castShadow=true;
  envGroup.add(mesh);
}
createSideFlap(true);createSideFlap(false);

// Lembo Inferiore
const btmShape=new THREE.Shape();
btmShape.moveTo(-ehw,-ehh);btmShape.lineTo(ehw,-ehh);btmShape.lineTo(0,ehh*0.1);btmShape.closePath();
const btmGeo=new THREE.ExtrudeGeometry(btmShape,{depth:0.02,bevelEnabled:true,bevelSize:0.005,bevelThickness:0.005,bevelSegments:2});
const btmFlap=new THREE.Mesh(btmGeo,mPaperInternal);
btmFlap.position.z=ED/2 - 0.005;
btmFlap.castShadow=true;
envGroup.add(btmFlap);

// Lembo Superiore Dinamico (Hinge Animation Group)
const topFlapGroup=new THREE.Group();
topFlapGroup.position.set(0,ehh,ED/2);
envGroup.add(topFlapGroup);

const topShape=new THREE.Shape();
topShape.moveTo(-ehw,0);topShape.lineTo(ehw,0);topShape.lineTo(0,-ehh*0.95);topShape.closePath();
const topGeo=new THREE.ExtrudeGeometry(topShape,{depth:0.02,bevelEnabled:true,bevelSize:0.008,bevelThickness:0.008,bevelSegments:3});
const topFlap=new THREE.Mesh(topGeo,mPaperBody);
topFlap.position.z=-0.01;
topFlap.castShadow=true;topFlap.receiveShadow=true;
topFlapGroup.add(topFlap);

/* LUXURY WAX SEAL (Lavorazione di Alto Livello) */
const sealGroup=new THREE.Group();
sealGroup.position.set(0,-ehh*0.45,0.015);
topFlapGroup.add(sealGroup);

const waxShape=new THREE.Shape();
for(let i=0;i<=72;i++){
  const a=i/72*Math.PI*2;
  const r=0.23+Math.sin(a*8)*0.01+Math.cos(a*13)*0.007; // Irregolarità organica cera liquida
  const x=Math.cos(a)*r,y=Math.sin(a)*r;
  if(i===0)waxShape.moveTo(x,y);else waxShape.lineTo(x,y);
}
waxShape.closePath();
const waxGeo=new THREE.ExtrudeGeometry(waxShape,{depth:0.03,bevelEnabled:true,bevelSize:0.02,bevelThickness:0.02,bevelSegments:6});
const waxMesh=new THREE.Mesh(waxGeo,mWaxSeal);
waxMesh.position.z=-0.01;
waxMesh.castShadow=true;
sealGroup.add(waxMesh);

// Monogramma "M" in Oro Goffrato Tridimensionale
const monoGroup=new THREE.Group();
monoGroup.position.set(0,0,0.03);
sealGroup.add(monoGroup);

function addGoldBar(w,h,d,x,y,rot=0){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mGoldPremium);
  m.position.set(x,y,d/2);m.rotation.z=rot;
  monoGroup.add(m);
}
addGoldBar(0.025,0.14,0.015,-0.06,0); // Asta SX
addGoldBar(0.025,0.14,0.015,0.06,0);  // Asta DX
addGoldBar(0.02,0.08,0.015,-0.025,0.03,-0.55); // Diagonale SX
addGoldBar(0.02,0.08,0.015,0.025,0.03,0.55);   // Diagonale DX
addGoldBar(0.05,0.01,0.01,-0.06,-0.07); // Grazie inferiori
addGoldBar(0.05,0.01,0.01,0.06,-0.07);

/* LETTERA INTERNA (Minimal Elegant Card) */
const letterGroup=new THREE.Group();
letterGroup.position.set(0,0,0.005);
envGroup.add(letterGroup);

const letterCard=new THREE.Mesh(new THREE.BoxGeometry(EW*0.9,EH*0.95,0.01),mLetterPaper);
letterCard.castShadow=true;
letterGroup.add(letterCard);

// Righe della lettera incise in oro a caldo (Hot Stamping Foil Effect)
for(let i=0;i<5;i++){
  const y=-EH*0.2+i*EH*0.08;
  const line=new THREE.Mesh(new THREE.BoxGeometry(EW*0.68,0.004,0.002),mPaperInternal);
  line.position.set(0,y,0.006);
  letterGroup.add(line);
}
const logoHeader=new THREE.Mesh(new THREE.BoxGeometry(EW*0.15,0.015,0.003),mGoldPremium);
logoHeader.position.set(0,EH*0.3,0.006);
letterGroup.add(logoHeader);

/* CONTENITORE PARTICELLE (Pulviscolo Atmosferico di lusso) */
const pCount=150;
const pGeo=new THREE.BufferGeometry();
const pPos=new Float32Array(pCount*3);
for(let i=0;i<pCount*3;i+=3){
  pPos[i]=(Math.random()-0.5)*10;
  pPos[i+1]=(Math.random()-0.5)*6;
  pPos[i+2]=(Math.random()-0.5)*5;
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const pMat=new THREE.PointsMaterial({color:0xc9a96e,size:0.012,transparent:true,opacity:0.25});
const dust=new THREE.Points(pGeo,pMat);
scene.add(dust);

/* RAYCASTING PER CLICK AD ALTA PRECISIONE */
const hitTarget=new THREE.Mesh(new THREE.BoxGeometry(EW+0.2,EH+0.2,0.5),new THREE.MeshBasicMaterial({visible:false}));
scene.add(hitTarget);

/* MACCHINA A STATI ED EASING INTERPOLATI (Fisica Organica) */
let state='idle'; // idle -> opening -> extracting -> completed
let progressAnim=0.0;
let idleTimer=0.0;
const mouse=new THREE.Vector2();
const raycaster=new THREE.Raycaster();

addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
});

function triggersOpen(){
  if(state!=='idle') return;
  raycaster.setFromCamera(mouse,camera);
  if(raycaster.intersectObject(hitTarget).length > 0){
    state='opening';
    document.getElementById('hint').style.opacity='0';
  }
}
addEventListener('click',triggersOpen);
addEventListener('touchstart',triggersOpen,{passive:true});

// Curve matematiche personalizzate per simulare rimbalzi elastici e strappi realistici
function elasticOut(t) {
  return Math.sin(-13 * Math.PI / 2 * (t + 1)) * Math.pow(2, -10 * t) + 1;
}
function cubicInOut(t) {
  return t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1;
}

let lastTime=performance.now();

/* ANIMATION LOOP ENGINE */
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  idleTimer+=dt;

  // Movimento fluttuante iniziale molto smorzato ed elegante
  if(state==='idle'){
    envGroup.position.y=Math.sin(idleTimer*1.0)*0.04;
    envGroup.rotation.y+=(mouse.x*0.12 - envGroup.rotation.y)*0.05;
    envGroup.rotation.x+=(-mouse.y*0.08 - envGroup.rotation.x)*0.05;
    
    // Spostamento leggero della luce per riflessi d'oro sempre cangianti
    jewelryGlow.position.x=Math.sin(idleTimer*1.5)*0.5;
  }

  // Micro movimenti pulviscolo sensibili al mouse
  dust.rotation.y+=0.0005;
  dust.position.x+=(mouse.x*0.05 - dust.position.x)*0.02;

  /* CORE STATE MACHINE DELLA BUSTA */
  if(state==='opening'){
    progressAnim+=dt*1.1; // Velocità di sblocco della cera
    
    // Fase 1: Rotazione drammatica del lembo con rimbalzo elastico finale (Inerzia della carta pesante)
    if(progressAnim<=1.0){
      topFlapGroup.rotation.x=lerp(0,-Math.PI*0.82,elasticOut(progressAnim));
    } else {
      progressAnim=0.0;
      state='extracting';
    }
  }
  else if(state==='extracting'){
    progressAnim+=dt*0.8; // Estrazione fluida
    
    if(progressAnim<=1.0){
      const easeVal=cubicInOut(progressAnim);
      
      // La lettera scivola verso l'alto ed esce dalla busta con asse Z ravvicinato
      letterGroup.position.y=lerp(0,EH*1.15,easeVal);
      letterGroup.position.z=lerp(0.005,0.3,easeVal);
      
      // La busta si allontana e scende dolcemente per dare profondità di campo
      body.position.y=lerp(0,-0.6,easeVal);
      body.position.z=lerp(0,-0.4,easeVal);
      body.rotation.x=lerp(0,0.2,easeVal);
      
      // Regia Telecamera (Macro-zoom focalizzato sulla lettera)
      camera.position.z=lerp(6.5,4.0,easeVal);
      camera.position.y=lerp(0,EH*0.4,easeVal);
    } else {
      state='completed';
      document.getElementById('overlay').style.opacity='1'; // Dissolvenza finale professionale opzionale
    }
  }

  renderer.render(scene,camera);
}

function lerp(a,b,t){return a+(b-a)*t}

animate();
</script>
</body>
</html>
