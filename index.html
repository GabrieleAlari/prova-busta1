<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>M. Studio — Ultra HD 3D Experience</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body,html{width:100%;height:100%;overflow:hidden;background:#0d0b0a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  #canvas-container{width:100%;height:100vh;position:relative}
  canvas{width:100%;height:100%;display:block}
  #ui-hint{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:10;transition:opacity 0.6s ease}
  .label{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:#d4af37;opacity:0.8}
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="renderCanvas"></canvas>
  <div id="ui-hint"><div class="label">Clicca per avviare il rendering animato</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const container = document.getElementById('canvas-container');
const canvas = document.getElementById('renderCanvas');

/* 1. SETUP DEL MOTORE DI RENDERING AVANZATO */
const renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true, alpha: false, powerPreference: "high-performance"});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Ombre cinematiche morbide
renderer.toneMapping = THREE.ACESFilmicToneMapping; // Profilo colore cinematografico da workstation 3D
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0b0a);
scene.fog = new THREE.FogExp2(0x0d0b0a, 0.05);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5.8);

/* 2. GENERAZIONE HDRI PROCEDURALE (STUDIO MAP) */
// Crea una mappa di riflessione per dare all'oro e alla ceralacca i riflessi tipici dei rendering offline
function generateSpecularEnvMap() {
  const size = 64;
  const data = new Uint8Array(size * size * 3);
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size; j++) {
      const idx = (i * size + j) * 3;
      // Simula softbox da studio fotografico alto e laterale
      const factor = Math.exp(-(Math.pow(i - size/3, 2) + Math.pow(j - size/2, 2)) / 300);
      const val = Math.floor(factor * 255);
      data[idx] = val + 20;     
      data[idx+1] = val + 15;   
      data[idx+2] = val + 10;   
    }
  }
  const texture = new THREE.DataTexture(data, size, size, THREE.RGBFormat);
  texture.mapping = THREE.EquirectangularReflectionMapping;
  texture.needsUpdate = true;
  return texture;
}
const envMap = generateSpecularEnvMap();

/* 3. SET LUCI FOTOGRAFICO A 4 PUNTI (Key, Fill, Rim, Floor Kick) */
const ambientLight = new THREE.AmbientLight(0x221f1c, 0.8);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xfff6eb, 3.5);
keyLight.position.set(5, 8, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 4096; // Risoluzione 4K per ombre nette senza aliasing
keyLight.shadow.mapSize.height = 4096;
keyLight.shadow.bias = -0.00005;
keyLight.shadow.normalBias = 0.002;
keyLight.shadow.radius = 3;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xcce2ff, 1.2); // Contrasto freddo soft
fillLight.position.set(-5, -2, 2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 2.5); // Accenta le silhouette dei bordi
rimLight.position.set(0, -6, -4);
scene.add(rimLight);

/* 4. TEXTURE AD ALTA RISOLUZIONE APERIODICHE PER LA CARTA */
function generatePaperBump() {
  const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#808080'; ctx.fillRect(0,0,512,512);
  for(let i=0; i<60000; i++) {
    const x = Math.random()*512, y = Math.random()*512;
    const col = Math.floor(128 + (Math.random() - 0.5) * 25);
    ctx.fillStyle = `rgb(${col},${col},${col})`;
    ctx.fillRect(x, y, 1, 1);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 2);
  return tex;
}
const paperBump = generatePaperBump();

/* 5. MATERIALI ULTRA-REALISTICI FISICI (PBR) */
const matEnvelopeOutside = new THREE.MeshPhysicalMaterial({
  color: 0xfcfaf2, roughness: 0.85, metalness: 0, bumpMap: paperBump, bumpScale: 0.002,
  clearcoat: 0.02, clearcoatRoughness: 0.5, side: THREE.FrontSide
});

const matEnvelopeInside = new THREE.MeshPhysicalMaterial({
  color: 0xeae2cb, roughness: 0.9, metalness: 0, bumpMap: paperBump, bumpScale: 0.003, side: THREE.BackSide
});

const matGoldStamping = new THREE.MeshPhysicalMaterial({
  color: 0xcaa64d, roughness: 0.18, metalness: 0.98, envMap: envMap, envMapIntensity: 2.5,
  clearcoat: 0.2, clearcoatRoughness: 0.1
});

const matWaxSeal = new THREE.MeshPhysicalMaterial({
  color: 0x6e1616, roughness: 0.32, metalness: 0.05, envMap: envMap, envMapIntensity: 0.8,
  clearcoat: 0.7, clearcoatRoughness: 0.2, transmission: 0.1, thickness: 0.5 // Simula la leggera traslucenza della cera
});

/* 6. COSTRUZIONE DELLA GEOMETRIA SENZA COMPRENSIONE DI PIANI (Zero Z-Fighting) */
const EW = 2.6, EH = 1.7, ED = 0.04;
const mainGroup = new THREE.Group();
scene.add(mainGroup);

// Corpo Posteriore e Spessore Interno
const backGeo = new THREE.BoxGeometry(EW, EH, ED);
const backMesh = new THREE.Mesh(backGeo, [matEnvelopeOutside, matEnvelopeOutside, matEnvelopeOutside, matEnvelopeOutside, matEnvelopeInside, matEnvelopeOutside]);
backMesh.castShadow = true; backMesh.receiveShadow = true;
mainGroup.add(backMesh);

// Lembo Inferiore e Laterali Estrusi Fisicamente per evitare sovrapposizioni (Spessore strutturale 0.01 di distacco)
function createSideFlap(isLeft) {
  const s = isLeft ? -1 : 1;
  const shape = new THREE.Shape();
  shape.moveTo(s * (EW/2), -EH/2);
  shape.lineTo(s * (EW/2), EH/2);
  shape.lineTo(0, 0);
  const extOpts = { depth: 0.01, bevelEnabled: true, bevelSize: 0.002, bevelThickness: 0.002, bevelSegments: 3 };
  const geo = new THREE.ExtrudeGeometry(shape, extOpts);
  const mesh = new THREE.Mesh(geo, matEnvelopeOutside);
  mesh.position.z = ED/2 + 0.001; // Offset micrometrico controllato anti-bug
  mesh.castShadow = true;
  mainGroup.add(mesh);
}
createSideFlap(true); createSideFlap(false);

const botShape = new THREE.Shape();
botShape.moveTo(-EW/2, -EH/2); botShape.lineTo(EW/2, -EH/2); botShape.lineTo(0, -EH*0.05);
const botGeo = new THREE.ExtrudeGeometry(botShape, { depth: 0.01, bevelEnabled: true, bevelSize: 0.002, bevelThickness: 0.002, bevelSegments: 3 });
const botMesh = new THREE.Mesh(botGeo, matEnvelopeOutside);
botMesh.position.z = ED/2 + 0.003; // Layer superiore ai laterali
botMesh.castShadow = true;
mainGroup.add(botMesh);

/* LEMBO SUPERIORE MORBIDO (Deformabile via Codice per evitare rigidità) */
// Usiamo una PlaneGeometry densa di segmenti per poterla curvare matematicamente
const topFlapSegmentsY = 30;
const topFlapGeo = new THREE.PlaneGeometry(EW, EH/2 + 0.05, 20, topFlapSegmentsY);
// Sposta il pivot geometrico sul bordo superiore della busta per una rotazione fisica corretta
topFlapGeo.translate(0, -(EH/4), 0);

const topFlapMesh = new THREE.Mesh(topFlapGeo, new THREE.MeshPhysicalMaterial({
  color: 0xfcfaf2, roughness: 0.85, bumpMap: paperBump, bumpScale: 0.002, side: THREE.DoubleSide
}));
topFlapMesh.position.set(0, EH/2, ED/2 + 0.005);
topFlapMesh.castShadow = true;
mainGroup.add(topFlapMesh);

// Salva la posizione originale dei vertici per calcolare la curvatura dinamica (Flessione della carta)
const posAttr = topFlapGeo.attributes.position;
const originalVertices = [];
for (let i = 0; i < posAttr.count; i++) {
  originalVertices.push(new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)));
}

/* SIGILLO DI CERA REALE (Forma Organica complessa ad alta densità) */
const sealGroup = new THREE.Group();
sealGroup.position.set(0, -EH/4, 0.02);
topFlapMesh.add(sealGroup);

const sealShape = new THREE.Shape();
for(let i=0; i<=90; i++) {
  const ang = (i/90) * Math.PI * 2;
  const radius = 0.2 + Math.sin(ang * 9) * 0.012 + Math.cos(ang * 14) * 0.006; // Bordi irregolari della cera fusa pressata
  const x = Math.cos(ang) * radius; const y = Math.sin(ang) * radius;
  if(i===0) sealShape.moveTo(x,y); else sealShape.lineTo(x,y);
}
const sealGeo = new THREE.ExtrudeGeometry(sealShape, {depth: 0.02, bevelEnabled: true, bevelSize: 0.015, bevelThickness: 0.015, bevelSegments: 5});
const sealMesh = new THREE.Mesh(sealGeo, matWaxSeal);
sealMesh.castShadow = true;
sealGroup.add(sealMesh);

// Monogramma inciso internamente (Incastonato)
const monoGeo = new THREE.BoxGeometry(0.12, 0.12, 0.01);
const monoMesh = new THREE.Mesh(monoGeo, matGoldStamping);
monoMesh.position.z = 0.025;
sealGroup.add(monoMesh);

/* LETTERA INTERNA RIGIDA PREMIUM */
const letterGeo = new THREE.BoxGeometry(EW * 0.94, EH * 0.94, 0.015);
const letterMesh = new THREE.Mesh(letterGeo, new THREE.MeshPhysicalMaterial({color: 0xffffff, roughness: 0.7, metalness: 0}));
letterMesh.position.set(0, 0, 0);
letterMesh.castShadow = true;
mainGroup.add(letterMesh);

// Righe della lettera in foglia d'oro a rilievo
const goldLineGeo = new THREE.BoxGeometry(EW*0.6, 0.01, 0.002);
for(let i=0; i<4; i++) {
  const gl = new THREE.Mesh(goldLineGeo, matGoldStamping);
  gl.position.set(0, EH*0.2 - (i*0.15), 0.008);
  letterMesh.add(gl);
}

/* 7. MACCHINA STATI DI RENDERING ED EASING CINEMATICI */
let animationState = 'idle'; 
let animationProgress = 0.0;
let timeCounter = 0.0;
const mouse = new THREE.Vector2();

// Intercettore di click invisibile per evitare fallimenti di raycasting
const interactionTarget = new THREE.Mesh(new THREE.BoxGeometry(EW*1.5, EH*1.5, 0.4), new THREE.MeshBasicMaterial({visible: false}));
scene.add(interactionTarget);

window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

function startAnimation() {
  if (animationState !== 'idle') return;
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  if (raycaster.intersectObject(interactionTarget).length > 0) {
    animationState = 'opening';
    document.getElementById('ui-hint').style.opacity = '0';
  }
}
window.addEventListener('click', startAnimation);
window.addEventListener('touchstart', startAnimation, {passive: true});

/* ANIMAZIONE PARABOLICA CON DEFORMAZIONE VERTEX DI FLESSIONE */
function updateFlapDeformation(progress) {
  // progress va da 0 (chiuso) a 1 (aperto a 180 gradi)
  const currentAngle = progress * -Math.PI * 0.95; 
  
  const pos = topFlapGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const orig = originalVertices[i];
    
    // Calcola l'intensità di curvatura in base a quanto il vertice è lontano dal punto di ancoraggio (Y=0)
    const distanceFactor = Math.abs(orig.y) / (EH / 2);
    
    // Equazione di flessione parabolica della carta sotto sforzo d'apertura
    const bendIntensity = Math.sin(progress * Math.PI) * 0.18; 
    const localAngle = currentAngle * distanceFactor;
    
    // Calcola la nuova coordinata deformata nello spazio della cerniera
    const newY = orig.y * Math.cos(localAngle) - (bendIntensity * Math.pow(distanceFactor, 2));
    const newZ = orig.y * Math.sin(localAngle) + (bendIntensity * Math.sin(localAngle));
    
    pos.setXYZ(i, orig.x, newY, newZ);
  }
  pos.needsUpdate = true;
  topFlapGeo.computeVertexNormals(); // Ricalcola i riflessi della luce sulla superficie curva
}

const clock = new THREE.Clock();

/* ENGINE ANIMATION LOOP */
function renderLoop() {
  requestAnimationFrame(renderLoop);
  const delta = Math.min(clock.getDelta(), 0.03);
  timeCounter += delta;

  // Inertia tracking del mouse morbida per un look da cinepresa cinematografica
  if (animationState === 'idle') {
    mainGroup.rotation.y += (mouse.x * 0.15 - mainGroup.rotation.y) * 0.04;
    mainGroup.rotation.x += (-mouse.y * 0.1 - mainGroup.rotation.x) * 0.04;
    // Leggera fluttuazione casuale
